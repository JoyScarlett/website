<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="pc.css">

<body>
    <!-- 导航栏 -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <div class="nav-logo" id="navLogo">
                <!-- 动态渲染 -->
            </div>
            <ul class="nav-menu" id="navMenu">
                <!-- 动态渲染 -->
            </ul>
            <div class="nav-cta">
                <button class="nav-btn" data-button="nav-contact" id="navCtaBtn">
                    <!-- 动态渲染 -->
                </button>
            </div>
            <!-- 移动端菜单按钮 -->
            <button class="mobile-menu-toggle" id="mobileMenuToggle">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <!-- Hero区 -->
    <section class="hero-section" id="heroSection">
        <div class="hero-container">
            <div class="hero-content">
                <h1 class="hero-title" id="heroTitle">
                    <!-- 动态渲染 -->
                </h1>
                <p class="hero-subtitle" id="heroSubtitle">
                    <!-- 动态渲染 -->
                </p>
                <div class="hero-buttons" id="heroButtons">
                    <!-- 动态渲染 -->
                </div>
            </div>
            <div class="hero-visual" id="heroVisual">
                <!-- 动态渲染 -->
            </div>
        </div>
    </section>

    <!-- 功能区 -->
    <section class="features-section" id="featuresSection">
        <div class="features-container">
            <h2 class="section-title" id="featuresTitle">
                <!-- 动态渲染 -->
            </h2>
            <p class="section-subtitle" id="featuresSubtitle">
                <!-- 动态渲染 -->
            </p>
            <div class="features-grid" id="featuresGrid">
                <!-- 动态渲染 -->
            </div>
        </div>
    </section>

    <!-- 案例区 -->
    <section class="cases-section" id="casesSection">
        <div class="cases-container">
            <h2 class="section-title" id="casesTitle">
                <!-- 动态渲染 -->
            </h2>
            <p class="section-subtitle" id="casesSubtitle">
                <!-- 动态渲染 -->
            </p>
            <div class="cases-grid" id="casesGrid">
                <!-- 动态渲染 -->
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="footer" id="footer">
        <div class="footer-container">
            <div class="footer-content" id="footerContent">
                <!-- 动态渲染 -->
            </div>
            <div class="footer-bottom" id="footerBottom">
                <!-- 动态渲染 -->
            </div>
        </div>
    </footer>

    <!-- 第11步：域名跳转（最先加载） -->
    <script src="domain-config.js"></script>
    <script src="domain-router.js"></script>
    
    <!-- 加载脚本 -->
    <script src="config.js"></script>
    <script src="content-manager.js"></script>
    <script src="tracker.js"></script>
    <script src="pc.js"></script>
