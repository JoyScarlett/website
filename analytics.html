<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 小鸡AI营销系统 - 数据分析</title>
    <link rel="stylesheet" href="analytics.css">
</head>
<body>
    <div class="analytics-container">
        <!-- 顶部导航 -->
        <header class="analytics-header">
            <div class="header-content">
                <div class="logo">
                    <span class="logo-icon">🐔</span>
                    <span class="logo-text">数据分析中心</span>
                </div>
                <div class="header-actions">
                    <button class="refresh-btn" id="refreshBtn">
                        <span>🔄</span>
                        <span>刷新数据</span>
                    </button>
                    <button class="export-btn" id="exportBtn">
                        <span>📥</span>
                        <span>导出报表</span>
                    </button>
                </div>
            </div>
        </header>

        <!-- 筛选区 -->
        <section class="filter-section">
            <div class="filter-container">
                <div class="filter-group">
                    <label class="filter-label">日期范围</label>
                    <div class="date-inputs">
                        <input type="date" class="filter-input" id="startDate">
                        <span class="date-separator">至</span>
                        <input type="date" class="filter-input" id="endDate">
                    </div>
                </div>
                <div class="filter-group">
                    <label class="filter-label">快捷选择</label>
                    <div class="quick-filters">
                        <button class="quick-btn active" data-days="7">最近7天</button>
                        <button class="quick-btn" data-days="30">最近30天</button>
                        <button class="quick-btn" data-days="90">最近90天</button>
                        <button class="quick-btn" data-days="all">全部</button>
                    </div>
                </div>
                <div class="filter-group">
                    <label class="filter-label">运营人员</label>
                    <select class="filter-select" id="operatorFilter">
                        <option value="all">全部人员</option>
                        <!-- 动态加载 -->
                    </select>
                </div>
                <button class="apply-filter-btn" id="applyFilterBtn">
                    <span>🔍</span>
                    <span>应用筛选</span>
                </button>
            </div>
        </section>

        <!-- 统计卡片 -->
        <section class="stats-section">
            <div class="stats-grid">
                <div class="stat-card glass-effect">
                    <div class="stat-icon">👆</div>
                    <div class="stat-content">
                        <div class="stat-label">总点击数</div>
                        <div class="stat-value" id="totalClicks">-</div>
                        <div class="stat-change" id="totalChange">-</div>
                    </div>
                </div>
                <div class="stat-card glass-effect">
                    <div class="stat-icon">📅</div>
                    <div class="stat-content">
                        <div class="stat-label">今日点击</div>
                        <div class="stat-value" id="todayClicks">-</div>
                        <div class="stat-change" id="todayChange">-</div>
                    </div>
                </div>
                <div class="stat-card glass-effect">
                    <div class="stat-icon">👥</div>
                    <div class="stat-content">
                        <div class="stat-label">独立访客</div>
                        <div class="stat-value" id="uniqueVisitors">-</div>
                        <div class="stat-change" id="visitorChange">-</div>
                    </div>
                </div>
                <div class="stat-card glass-effect">
                    <div class="stat-icon">📈</div>
                    <div class="stat-content">
                        <div class="stat-label">平均转化率</div>
                        <div class="stat-value" id="conversionRate">-</div>
                        <div class="stat-change" id="conversionChange">-</div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 图表区 -->
        <section class="charts-section">
            <div class="charts-grid">
                <!-- 趋势图 -->
                <div class="chart-card glass-effect">
                    <div class="chart-header">
                        <h3 class="chart-title">📊 点击趋势</h3>
                        <div class="chart-legend" id="trendLegend"></div>
                    </div>
                    <div class="chart-body">
                        <canvas id="trendChart"></canvas>
                    </div>
                </div>

                <!-- 热门按钮饼图 -->
                <div class="chart-card glass-effect">
                    <div class="chart-header">
                        <h3 class="chart-title">🎯 热门按钮分布</h3>
                    </div>
                    <div class="chart-body">
                        <canvas id="buttonPieChart"></canvas>
                    </div>
                </div>

                <!-- 联系方式环形图 -->
                <div class="chart-card glass-effect">
                    <div class="chart-header">
                        <h3 class="chart-title">💬 联系方式偏好</h3>
                    </div>
                    <div class="chart-body">
                        <canvas id="contactDoughnutChart"></canvas>
                    </div>
                </div>

                <!-- 运营人员分析 -->
                <div class="chart-card glass-effect">
                    <div class="chart-header">
                        <h3 class="chart-title">👨‍💼 运营人员效果</h3>
                    </div>
                    <div class="chart-body">
                        <canvas id="operatorBarChart"></canvas>
                    </div>
                </div>
            </div>
        </section>

        <!-- 数据表格 -->
        <section class="table-section">
            <div class="table-card glass-effect">
                <div class="table-header">
                    <h3 class="table-title">📋 详细数据</h3>
                    <div class="table-actions">
                        <input type="text" class="search-input" id="searchInput" placeholder="搜索...">
                        <select class="sort-select" id="sortSelect">
                            <option value="time-desc">时间降序</option>
                            <option value="time-asc">时间升序</option>
                            <option value="button">按钮名称</option>
                        </select>
                    </div>
                </div>
                <div class="table-body">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>时间</th>
                                <th>按钮名称</th>
                                <th>按钮类型</th>
                                <th>来源</th>
                                <th>设备</th>
                                <th>浏览器</th>
                                <th>操作系统</th>
                            </tr>
                        </thead>
                        <tbody id="dataTableBody">
                            <tr>
                                <td colspan="7" class="loading-cell">加载中...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div class="table-footer">
                    <div class="pagination" id="pagination">
                        <!-- 动态生成 -->
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- 加载脚本 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="config.js"></script>
    <script src="analytics.js"></script>
</body>
</html>
